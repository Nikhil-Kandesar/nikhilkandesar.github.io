        /* ================= REVEAL ON SCROLL ================= */
        function useReveal() {
            const ref = useRef(null);
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const obs = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
                }, { threshold: 0.12 });
                obs.observe(el);
                return () => obs.disconnect();
            }, []);
            return [ref, visible];
        }

        function Reveal({ children, className = "", delay = 0 }) {
            const [ref, visible] = useReveal();
            return (
                <div
                    ref={ref}
                    className={`${className} transition-all duration-700 ease-out`}
                    style={{
                        opacity: visible ? 1 : 0,
                        transform: visible ? "translateY(0)" : "translateY(24px)",
                        transitionDelay: `${delay}ms`,
                    }}
                >
                    {children}
                </div>
            );
        }

        /* ================= TAG GRID (balanced row wrap) ================= */
        // Distributes items across rows of a target width so the last row
        // is never a ragged 1-2 item leftover — rows are balanced instead
        // of greedily packed left-to-right.
        function balanceRows(items, perRow) {
            const rowCount = Math.ceil(items.length / perRow);
            const baseSize = Math.floor(items.length / rowCount);
            const remainder = items.length % rowCount;
            const rows = [];
            let idx = 0;
            for (let r = 0; r < rowCount; r++) {
                // distribute the remainder across the first rows so sizes
                // differ by at most 1, and earlier rows are never shorter
                // than later ones (keeps a "pyramid" rather than ragged tail)
                const size = baseSize + (r < remainder ? 1 : 0);
                rows.push(items.slice(idx, idx + size));
                idx += size;
            }
            return rows;
        }

                return () => window.removeEventListener("resize", update);

            const rows = balanceRows(items, perRow);
